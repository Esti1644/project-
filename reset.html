<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איפוס מערכת</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="container">
        <div class="login-box">
            <h1>🔄 איפוס המערכת</h1>
            <p style="text-align: center; margin-bottom: 20px;">לחץ על הכפתור כדי לאפס את כל הנתונים ולטעון את המתכונים החדשים</p>
            <button onclick="resetSystem()" class="btn btn-primary">איפוס וטעינה מחדש</button>
            <a href="index.html" class="btn" style="margin-top: 10px; width: 100%; text-align: center;">חזרה למסך כניסה</a>
        </div>
    </div>
    <script>
        function resetSystem() {
            if (confirm('האם אתה בטוח? זה ימחק את כל הנתונים!')) {
                localStorage.clear();
                alert('✅ המערכת אופסה בהצלחה!');
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
